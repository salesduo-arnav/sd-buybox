services:
  gateway:
    image: nginx:latest
    ports:
      - "${GATEWAY_PORT:-5175}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - buybox-net
    depends_on:
      - backend
      - frontend

  postgres:
    image: postgres:16-alpine
    container_name: buybox-db
    ports:
      - "${PGPORT:-5434}:5432"
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    volumes:
      - buybox-pgdata:/var/lib/postgresql/data
    networks:
      - buybox-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: buybox-backend
    env_file: ./.env
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      CORE_PLATFORM_URL: http://host.docker.internal:4001
      CORE_PLATFORM_INTERNAL_URL: http://host.docker.internal:4001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5003:5003"
    networks:
      - buybox-net
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: buybox-frontend
    networks:
      - buybox-net
    depends_on:
      - backend

networks:
  buybox-net:
    driver: bridge

volumes:
  buybox-pgdata:
